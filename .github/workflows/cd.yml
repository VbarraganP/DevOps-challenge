name: CD Pipeline

on:
   push:
      branches:
         - main
   workflow_dispatch:

jobs:
   build-and-deploy:
      runs-on: ubuntu-latest

      steps:
         - name: checkout
           uses: actions/checkout@v7

         - name: Login to Docker Hub
           uses: docker/login-action@v4
           with:
              username: mrbarragan17
              password: ${{ secrets.DOCKERHUB_TOKEN }}

         - name: login azure
           uses: azure/login@v3
           with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}

         - name: Build and push
           uses: docker/build-push-action@v7
           with:
              context: codebase/rdicidr-0.1.0
              push: true
              tags: mrbarragan17/devops-challenge:latest

         - name: Deploy public GHCR image to Container App
           uses: azure/container-apps-deploy-action@v1
           with:
              containerAppName: devops-challenge
              resourceGroup: test
              imageToDeploy: mrbarragan17/devops-challenge:latest
              registryUrl: docker.io
