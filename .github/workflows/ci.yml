name: CI Pipeline

on:
   pull_request:
      types: [opened, reopened, synchronize]

jobs:
   build-and-test:
      runs-on: ubuntu-latest
      defaults:
         run:
            working-directory: codebase/rdicidr-0.1.0

      steps:
         - name: checkout
           uses: actions/checkout@v7

         - name: setup node
           uses: actions/setup-node@v6
           with:
              node-version: "15"

         - name: install
           run: npm install

         - name: lint
           run: npm run lint

         - name: test
           run: CI=true npm run test

         - name: build
           run: npm run build
